spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/talking_shaha}
spring.datasource.username=${DB_USERNAME:shaha_user}
spring.datasource.password=${DB_PASSWORD:shaha_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations

springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.demo-data.enabled=${DEMO_DATA_ENABLED:true}

app.ai.chat.enabled=${AI_CHAT_ENABLED:true}
app.ai.chat.base-url=${HUGGINGFACE_BASE_URL:https://router.huggingface.co}
app.ai.chat.token=${HUGGINGFACE_TOKEN:}
app.ai.chat.model=${HUGGINGFACE_MODEL:google/gemma-4-31B-it:fastest}
app.ai.chat.max-tokens=${AI_CHAT_MAX_TOKENS:500}
app.ai.chat.temperature=${AI_CHAT_TEMPERATURE:0.2}