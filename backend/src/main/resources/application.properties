spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/talking_shaha}
spring.datasource.username=${DB_USERNAME:shaha_user}
spring.datasource.password=${DB_PASSWORD:shaha_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations

springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.demo-data.enabled=${DEMO_DATA_ENABLED:true}

app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-32+bytes-minimum-0123456789}
app.jwt.access-ttl=PT15M
app.jwt.refresh-ttl=P30D
app.ai.chat.enabled=${AI_CHAT_ENABLED:true}
app.ai.chat.base-url=${TIMEWEB_AI_BASE_URL:https://agent.timeweb.cloud/api/v1/cloud-ai/agents/fc0c89ec-4868-408c-99cd-dc6d5ea764c8/v1}
app.ai.chat.token=${TIMEWEB_AI_TOKEN:}
app.ai.chat.model=${TIMEWEB_AI_MODEL:timeweb-agent}
app.ai.chat.max-tokens=${AI_CHAT_MAX_TOKENS:500}
app.ai.chat.temperature=${AI_CHAT_TEMPERATURE:0.2}
