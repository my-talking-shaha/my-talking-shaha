version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: talking-shaha-db
    environment:
      POSTGRES_DB: talking_shaha
      POSTGRES_USER: shaha_user
      POSTGRES_PASSWORD: shaha_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - talking-shaha-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shaha_user -d talking_shaha"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: talking-shaha-backend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/talking_shaha
      - SPRING_DATASOURCE_USERNAME=shaha_user
      - SPRING_DATASOURCE_PASSWORD=shaha_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - talking-shaha-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: talking-shaha-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - talking-shaha-network
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8080

networks:
  talking-shaha-network:
    driver: bridge

volumes:
  postgres-data:
