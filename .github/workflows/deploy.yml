name: Development deploy

on:
  push:
    branches:
      - main

concurrency:
  group: development-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-smoke-test:
    name: Application Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start application stack
        env:
          DOCKER_BUILDKIT: 1
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml up -d --build --remove-orphans backend frontend

      - name: Wait for backend health
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi

            echo "Backend is not healthy yet, retry $attempt/30"
            sleep 5
          done

          echo "Backend did not become healthy in time" >&2
          docker compose -f docker/docker-compose.yml ps postgres backend frontend
          docker compose -f docker/docker-compose.yml logs --no-color postgres backend frontend
          exit 1

      - name: Wait for frontend health
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl -fsS http://localhost/health; then
              exit 0
            fi

            echo "Frontend is not healthy yet, retry $attempt/30"
            sleep 5
          done

          echo "Frontend did not become healthy in time" >&2
          docker compose -f docker/docker-compose.yml ps postgres backend frontend
          docker compose -f docker/docker-compose.yml logs --no-color postgres backend frontend
          exit 1

      - name: Verify OpenAPI docs
        run: curl -fsS http://localhost/v3/api-docs >/dev/null

      - name: Verify Swagger UI
        run: |
          set -euo pipefail

          curl -fsS http://localhost/swagger-ui.html | grep -q "SwaggerUIBundle"
          curl -fsS http://localhost/webjars/swagger-ui/5.32.2/swagger-ui.css | grep -q "swagger-ui"

      - name: Dump application stack logs
        if: always()
        run: docker compose -f docker/docker-compose.yml logs --no-color postgres backend frontend

      - name: Stop application stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans

  deploy:
    name: Deploy to development server
    needs: app-smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail

          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_SSH_KEY:?SERVER_SSH_KEY secret is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application services
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
        run: |
          set -euo pipefail

          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_USER:?SERVER_USER secret is required}"
          : "${SERVER_APP_PATH:?SERVER_APP_PATH secret is required}"

          ssh -i ~/.ssh/deploy_key \
            -p "${SERVER_PORT:-22}" \
            -o IdentitiesOnly=yes \
            "$SERVER_USER@$SERVER_HOST" \
            "SERVER_APP_PATH='$SERVER_APP_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$SERVER_APP_PATH"

          git fetch --prune origin main
          git checkout main
          git pull --ff-only origin main

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose is not installed" >&2
            exit 1
          fi

          $COMPOSE -f docker/docker-compose.yml down -v --remove-orphans
          $COMPOSE -f docker/docker-compose.yml up -d --build --remove-orphans backend frontend

          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              backend_ready=1
              break
            fi

            echo "Backend is not healthy yet, retry $attempt/30"
            sleep 5
          done

          if [ "${backend_ready:-0}" != "1" ]; then
            echo "Backend did not become healthy in time" >&2
            $COMPOSE -f docker/docker-compose.yml ps postgres backend frontend
            $COMPOSE -f docker/docker-compose.yml logs --no-color postgres backend frontend
            exit 1
          fi

          for attempt in {1..30}; do
            if curl -fsS http://localhost/health; then
              frontend_ready=1
              break
            fi

            echo "Frontend is not healthy yet, retry $attempt/30"
            sleep 5
          done

          if [ "${frontend_ready:-0}" != "1" ]; then
            echo "Frontend did not become healthy in time" >&2
            $COMPOSE -f docker/docker-compose.yml ps postgres backend frontend
            $COMPOSE -f docker/docker-compose.yml logs --no-color postgres backend frontend
            exit 1
          fi

          curl -fsS http://localhost/v3/api-docs >/dev/null
          curl -fsS http://localhost/swagger-ui.html | grep -q "SwaggerUIBundle"
          curl -fsS http://localhost/webjars/swagger-ui/5.32.2/swagger-ui.css | grep -q "swagger-ui"

          $COMPOSE -f docker/docker-compose.yml ps postgres backend frontend
          docker image prune -f
          REMOTE
