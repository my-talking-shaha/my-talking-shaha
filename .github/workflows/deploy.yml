name: Development deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: development-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to development server
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail

          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_SSH_KEY:?SERVER_SSH_KEY secret is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application services
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          TIMEWEB_AI_BASE_URL: ${{ secrets.TIMEWEB_AI_BASE_URL }}
          TIMEWEB_AI_TOKEN: ${{ secrets.TIMEWEB_AI_TOKEN }}
        run: |
          set -euo pipefail

          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_USER:?SERVER_USER secret is required}"
          : "${SERVER_APP_PATH:?SERVER_APP_PATH secret is required}"
          : "${TIMEWEB_AI_BASE_URL:?TIMEWEB_AI_BASE_URL secret is required}"
          : "${TIMEWEB_AI_TOKEN:?TIMEWEB_AI_TOKEN secret is required}"

          ssh -i ~/.ssh/deploy_key \
            -p "${SERVER_PORT:-22}" \
            -o IdentitiesOnly=yes \
            "$SERVER_USER@$SERVER_HOST" \
            "SERVER_APP_PATH='$SERVER_APP_PATH' TIMEWEB_AI_BASE_URL='$TIMEWEB_AI_BASE_URL' TIMEWEB_AI_TOKEN='$TIMEWEB_AI_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$SERVER_APP_PATH"

          git fetch --prune origin main
          git checkout main
          git pull --ff-only origin main

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose is not installed" >&2
            exit 1
          fi

          dump_deploy_diagnostics() {
            status=$?
            echo "Remote deploy failed with exit code ${status}" >&2
            echo "Disk usage:" >&2
            df -h >&2 || true
            echo "Memory usage:" >&2
            free -h >&2 || true
            echo "Docker disk usage:" >&2
            docker system df >&2 || true
            echo "Docker containers:" >&2
            docker ps -a >&2 || true
            echo "Compose status:" >&2
            $COMPOSE -f docker/docker-compose.yml ps postgres backend frontend >&2 || true
            echo "Compose logs:" >&2
            $COMPOSE -f docker/docker-compose.yml logs --no-color --tail=200 postgres backend frontend >&2 || true
            exit "$status"
          }

          trap dump_deploy_diagnostics ERR

          export DOCKER_BUILDKIT=1
          export BUILDKIT_PROGRESS=plain
          export COMPOSE_PROGRESS=plain

          BUILD_PROGRESS_ARGS=""
          if $COMPOSE -f docker/docker-compose.yml build --help 2>&1 | grep -q -- "--progress"; then
            BUILD_PROGRESS_ARGS="--progress=plain"
          fi

          $COMPOSE -f docker/docker-compose.yml build $BUILD_PROGRESS_ARGS backend frontend
          $COMPOSE -f docker/docker-compose.yml down -v --remove-orphans
          $COMPOSE -f docker/docker-compose.yml up -d --no-build --remove-orphans backend frontend

          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              backend_ready=1
              break
            fi

            echo "Backend is not healthy yet, retry $attempt/30"
            sleep 5
          done

          if [ "${backend_ready:-0}" != "1" ]; then
            echo "Backend did not become healthy in time" >&2
            $COMPOSE -f docker/docker-compose.yml ps postgres backend frontend
            $COMPOSE -f docker/docker-compose.yml logs --no-color postgres backend frontend
            exit 1
          fi

          for attempt in {1..30}; do
            if curl -fsS http://localhost/health; then
              frontend_ready=1
              break
            fi

            echo "Frontend is not healthy yet, retry $attempt/30"
            sleep 5
          done

          if [ "${frontend_ready:-0}" != "1" ]; then
            echo "Frontend did not become healthy in time" >&2
            $COMPOSE -f docker/docker-compose.yml ps postgres backend frontend
            $COMPOSE -f docker/docker-compose.yml logs --no-color postgres backend frontend
            exit 1
          fi

          curl -fsS http://localhost/v3/api-docs >/dev/null
          curl -fsS http://localhost/swagger-ui.html | grep -q "SwaggerUIBundle"
          curl -fsS http://localhost/webjars/swagger-ui/5.32.2/swagger-ui.css | grep -q "swagger-ui"

          $COMPOSE -f docker/docker-compose.yml ps postgres backend frontend
          docker image prune -f
          REMOTE
